<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doom Stalling — Settings</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f6f1eb;
      --bg-subtle: #ede6dc;
      --text: #2c2420;
      --text-secondary: #6b5e55;
      --accent: #c0533a;
      --accent-hover: #a8432d;
      --border: #d4cbc2;
      --input-bg: #faf7f4;
    }

    body {
      min-width: 380px;
      max-width: 520px;
      margin: 0 auto;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 2.5rem 2rem;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.3rem;
    }

    h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1.6rem;
      font-weight: 400;
      color: var(--text);
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 2.5rem;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .toggle input:checked + .toggle-track {
      background: var(--accent);
    }

    .toggle-track::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s ease;
    }

    .toggle input:checked + .toggle-track::after {
      transform: translateX(20px);
    }

    .toggle input:focus-visible + .toggle-track {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .section {
      margin-bottom: 2rem;
    }

    .section-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
      margin-bottom: 0.6rem;
    }

    input[type="number"],
    input[type="text"] {
      padding: 0.55rem 0.7rem;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      background: var(--input-bg);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      transition: border-color 0.15s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
    }

    input[type="number"] {
      width: 80px;
    }

    .delay-hint {
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-top: 0.3rem;
    }

    .site-list {
      list-style: none;
      margin-bottom: 0.8rem;
    }

    .site-list li {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--bg-subtle);
      font-size: 0.95rem;
    }

    .site-favicon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      border-radius: 2px;
    }

    .site-name-text {
      flex: 1;
      min-width: 0;
    }

    .site-list li:last-child {
      border-bottom: none;
    }

    .remove-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 0.3rem;
      border-radius: 3px;
      line-height: 1;
      transition: color 0.15s ease, background 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .remove-btn:hover {
      color: var(--accent);
      background: var(--bg-subtle);
    }

    .remove-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    .remove-btn svg {
      width: 16px;
      height: 16px;
    }

    .add-row {
      display: flex;
      gap: 0.5rem;
    }

    .add-row input {
      flex: 1;
    }

    .add-btn {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.55rem 0.9rem;
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    .add-btn:hover {
      border-color: var(--text-secondary);
      background: var(--bg-subtle);
    }

    .add-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .empty-state {
      font-size: 0.9rem;
      color: var(--text-secondary);
      font-style: italic;
      padding: 0.5rem 0;
    }

    .disabled-notice {
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-style: italic;
      margin-bottom: 2rem;
      padding: 0.6rem 0.8rem;
      background: var(--bg-subtle);
      border-radius: 4px;
      display: none;
    }

    .disabled-notice.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Doom Stalling</h1>
    <label class="toggle" title="Enable or disable Doom Stalling">
      <input type="checkbox" id="enabled-toggle" checked>
      <span class="toggle-track"></span>
    </label>
  </div>
  <p class="subtitle">Settings for your time-wasting intervention system.</p>
  <p class="disabled-notice" id="disabled-notice">Doom Stalling is currently disabled. Toggle the switch above to re-enable it.</p>

  <div class="section">
    <label class="section-label" for="delay">Countdown delay</label>
    <input type="number" id="delay" min="1" max="600" value="30" aria-describedby="delay-hint">
    <p class="delay-hint" id="delay-hint">Seconds to wait before you can proceed.</p>
  </div>

  <div class="section">
    <label class="section-label">Blocked sites</label>
    <ul class="site-list" id="site-list"></ul>
    <div class="add-row">
      <input type="text" id="new-site" placeholder="e.g. reddit.com" aria-label="New site to block">
      <button class="add-btn" id="btn-add">Add</button>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
